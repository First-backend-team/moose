{% extends 'base.html' %}
{% block content %}
<section class="hero-wrap hero-wrap-2">
    <div class="container">
        <div class="row no-gutters slider-text align-items-center justify-content-center">
            <div class="col-md-9 text-center ftco-animate pt-5">
                <h1 class="mb-3 bread">About</h1>
                <p class="breadcrumbs"><span class="mr-2"><a href="#">Home <i class="fa fa-chevron-right"></i></a></span>
                    <span>About <i class="fa fa-chevron-right"></i></span></p>
            </div>
        </div>
    </div>
</section>

<section class="hero-wrap py-md-4">
    <div class="overlay"></div>
    <div class="container">
        <div class="row no-gutters justify-content-center slider-text align-items-center" data-scrollax-parent="true">
            <div class="col-md-10 ftco-animate py-5">
                {% for about in abouts %}
                <div class="row pb-md-5">
                    <div class="col-md-4">
                        <div class="author">
                            <div class="img" style="background-image: url({{about.author_image.url}});"></div>
                            <div class="text">
                                <h3>{{ about.author_name }}</h3>
                                <p>{{ about.author.information }}</p>
                                <ul class="ftco-footer-social list-unstyled mt-2">
                                    <li class="ftco-animate"><a href="{{ about.twitter.url }}"><span
                                            class="fa fa-twitter"></span></a></li>
                                    <li class="ftco-animate"><a href="{{ about.facebook.url }}"><span class="fa fa-facebook"></span></a>
                                    </li>
                                    <li class="ftco-animate"><a href="{{ about.instagram.url }}"><span class="fa fa-instagram"></span></a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-8 author-details">
                        <h2>{{ about.title }}</h2>
                        <p>{{ about.description }}</p>
<!--                        <div class="mt-5">-->
<!--                            <h3>How I Work</h3>-->
<!--                            <p>Far far away, behind the word mountains, far from the countries Vokalia and Consonantia,-->
<!--                                there live the blind texts. Separated they live in <a-->
<!--                                        href="about.html#">Bookmarksgrove</a> right at the coast of the Semantics, a-->
<!--                                large language ocean.</p>-->
<!--                        </div>-->
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</section>

<section class="ftco-intro ftco-section bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-12 text-center">
                <h2>Subscribe to our Newsletter</h2>
                <div class="row justify-content-center">
                    <div class="col-md-5">
                        <form action="about.html#" class="subscribe-form">
                            <div class="form-group d-flex">
                                <input type="text" class="form-control" placeholder="Enter email address">
                                <input type="submit" value="Subscribe" class="submit px-3">
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
</section>

{% endblock %}
